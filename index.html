<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>中学校国語科 授業設計ガチャ</title>
<meta name="description" content="教材と目標を固定し、授業への別ルートを引くためのツール。完成指導案ではなく、授業づくりの叩き台を提示します。">
<style>
/* ============================================================
   中学校国語科 授業設計ガチャ
   配色: 半紙白 × 墨 × 鉄紺(主) × 朱(印) × 罫線鼠
   外部通信なし / システムフォントのみ
   ============================================================ */
:root {
  --paper: #f7f5f0;
  --paper-deep: #efece4;
  --ink: #2b2a28;
  --ink-soft: #5c5951;
  --kon: #27436b;      /* 鉄紺: 主要アクション */
  --kon-deep: #1c3252;
  --shu: #b0492a;      /* 朱: ガチャ・印 */
  --rule: #d8d2c6;
  --card: #fffdf9;
  --warn-bg: #f6ead9;
  --warn-ink: #7a4a12;
  --ok: #3d6b4f;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(43,42,40,.08), 0 4px 14px rgba(43,42,40,.06);
  --serif: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
  --sans: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.65;
  overflow-x: hidden;
}
#wrap { max-width: 720px; margin: 0 auto; padding: 0 16px 140px; }

/* ---- ヘッダー ---- */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 2px 10px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 14px;
}
.app-header .brand {
  font-family: var(--serif);
  font-weight: 600; font-size: 17px; letter-spacing: .06em;
  cursor: pointer;
}
.brand .brand-sub { font-size: 11px; color: var(--ink-soft); display:block; letter-spacing:.14em; font-family: var(--sans); }
.header-actions { display: flex; gap: 8px; }

/* ---- 進行状況 ---- */
.progress { display: flex; gap: 6px; margin: 4px 0 16px; align-items: center; }
.progress .step-dot {
  flex: 1; height: 4px; border-radius: 2px; background: var(--rule);
}
.progress .step-dot.done { background: var(--kon); }
.progress .step-dot.now { background: var(--shu); }
.step-label { font-size: 12px; color: var(--ink-soft); letter-spacing: .08em; margin-bottom: 4px; }

h1 { font-family: var(--serif); font-size: 26px; line-height: 1.4; margin: 18px 0 8px; letter-spacing: .04em; }
h2 { font-family: var(--serif); font-size: 20px; margin: 22px 0 10px; letter-spacing: .04em; }
h3 { font-size: 15px; margin: 16px 0 6px; color: var(--kon-deep); }
p  { margin: 8px 0; }
.small { font-size: 13px; color: var(--ink-soft); }

/* ---- カード ---- */
.card {
  background: var(--card); border: 1px solid var(--rule);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 16px; margin: 12px 0; position: relative;
}
.notice {
  background: var(--warn-bg); color: var(--warn-ink);
  border: 1px solid #e4cba3; border-radius: 10px;
  padding: 10px 12px; font-size: 13px; margin: 10px 0;
}
.notice.blue { background: #e8edf5; color: var(--kon-deep); border-color: #c3cede; }

/* ---- ボタン ---- */
button { font-family: var(--sans); }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 48px; padding: 10px 18px;
  border-radius: 12px; border: 1px solid var(--rule);
  background: var(--card); color: var(--ink);
  font-size: 16px; cursor: pointer;
  transition: transform .05s ease, background .15s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.98); }
.btn.primary { background: var(--kon); border-color: var(--kon); color: #fff; }
.btn.primary:active { background: var(--kon-deep); }
.btn.gacha { background: var(--shu); border-color: var(--shu); color: #fff; font-family: var(--serif); letter-spacing: .08em; }
.btn.ghost { background: transparent; }
.btn.small { min-height: 40px; font-size: 13.5px; padding: 6px 12px; border-radius: 10px; }
.btn.block { width: 100%; }
.btn.danger { color: #93321a; border-color: #d8b0a2; }
.btn:focus-visible, .choice:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 3px solid rgba(39,67,107,.5); outline-offset: 2px;
}
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
.btn-row .btn { flex: 1; min-width: 130px; }

/* ---- 選択肢（チップ / リスト） ---- */
.choice-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 4px; }
.choice {
  min-height: 44px; padding: 9px 14px;
  border: 1.5px solid var(--rule); border-radius: 999px;
  background: var(--card); font-size: 14.5px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--ink);
}
.choice[aria-pressed="true"] {
  border-color: var(--kon); background: #e8edf5; color: var(--kon-deep); font-weight: 600;
}
.choice[aria-pressed="true"]::before { content: "✓"; font-size: 12px; }
.choice-list { display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
.choice-list .choice { border-radius: 12px; justify-content: flex-start; width: 100%; text-align: left; }

/* ---- 入力 ---- */
input[type=text], textarea, select {
  width: 100%; font-size: 16px; color: var(--ink);
  border: 1.5px solid var(--rule); border-radius: 10px;
  padding: 11px 12px; background: var(--card);
}
textarea { min-height: 84px; resize: vertical; line-height: 1.6; }
.field { margin: 14px 0; }
.field > label { display: block; font-weight: 600; font-size: 14.5px; margin-bottom: 6px; }
.pii-note { font-size: 12px; color: var(--warn-ink); margin: 4px 0 6px; }
.example { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; }

/* ---- 結果カード ---- */
.plan-card { padding: 16px 16px 12px; }
.plan-card .tanzaku {
  position: absolute; top: -1px; right: 14px;
  writing-mode: vertical-rl;
  background: var(--kon); color: #fff;
  font-family: var(--serif); font-size: 12.5px; letter-spacing: .18em;
  padding: 12px 5px 14px; border-radius: 0 0 6px 6px;
  box-shadow: var(--shadow);
}
.plan-card.alt .tanzaku { background: var(--shu); }
.plan-title { font-family: var(--serif); font-size: 18px; margin: 0 64px 4px 0; }
.plan-sec { border-top: 1px dashed var(--rule); padding: 10px 0 4px; margin-top: 10px; }
.plan-sec .sec-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.sec-name { font-size: 12.5px; letter-spacing: .12em; color: var(--kon-deep); font-weight: 700; }
.sec-tools { display: flex; gap: 4px; }
.icon-btn {
  min-width: 40px; min-height: 36px; border: 1px solid var(--rule);
  background: var(--card); border-radius: 9px; font-size: 12px; cursor: pointer; color: var(--ink-soft);
  padding: 2px 8px;
}
.icon-btn.locked { background: #e8edf5; border-color: var(--kon); color: var(--kon-deep); }
.sec-body { margin-top: 4px; font-size: 15px; white-space: pre-wrap; }
.sec-body ol, .sec-body ul { margin: 4px 0; padding-left: 22px; }
.reason { background: var(--paper-deep); border-radius: 10px; padding: 9px 12px; font-size: 13.5px; margin-top: 10px; }
.reason b { color: var(--kon-deep); }
details.more { margin-top: 10px; }
details.more summary {
  cursor: pointer; font-size: 13.5px; color: var(--kon-deep); font-weight: 600;
  min-height: 44px; display: flex; align-items: center;
}
.warn-list { margin: 8px 0; }
.warn-item { background: var(--warn-bg); color: var(--warn-ink); border-radius: 8px; padding: 8px 10px; font-size: 13px; margin: 6px 0; }

/* ---- フッター固定バー ---- */
.bottom-bar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
  background: rgba(247,245,240,.96);
  border-top: 1px solid var(--rule);
  backdrop-filter: blur(6px);
  padding: 10px 16px calc(12px + env(safe-area-inset-bottom));
}
.bottom-bar .inner { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; }
.bottom-bar .btn { flex: 1; }

/* ---- モーダル ---- */
.modal-back {
  position: fixed; inset: 0; background: rgba(43,42,40,.45); z-index: 50;
  display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: var(--card); width: 100%; max-width: 720px;
  border-radius: 18px 18px 0 0; padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
  max-height: 82vh; overflow-y: auto;
}
.modal h2 { margin-top: 4px; }
.check-line { display: flex; gap: 10px; align-items: flex-start; min-height: 44px; padding: 6px 0; font-size: 14.5px; }
.check-line input { width: 22px; height: 22px; margin-top: 2px; flex: none; }

.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(96px + env(safe-area-inset-bottom));
  background: var(--ink); color: #fff; border-radius: 999px;
  padding: 9px 18px; font-size: 13.5px; z-index: 60;
  opacity: 0; transition: opacity .25s; pointer-events: none;
}
.toast.show { opacity: 1; }

.top-hero { text-align: center; padding: 28px 6px 8px; }
.top-hero .stamp {
  display: inline-block; font-family: var(--serif);
  border: 2px solid var(--shu); color: var(--shu);
  border-radius: 8px; padding: 6px 10px; font-size: 13px; letter-spacing: .2em;
  transform: rotate(-2deg); margin-bottom: 14px;
}
.top-hero h1 { margin: 4px 0 6px; }
.top-hero .lede { color: var(--ink-soft); font-size: 14.5px; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

/* ============================================================
   印刷 CSS（A4）
   ============================================================ */
#print-root { display: none; }
@page { size: A4 portrait; margin: 12mm 14mm; }
@media print {
  body { background: #fff; font-size: 10.5pt; line-height: 1.5; }
  #wrap, .bottom-bar, .modal-back, .toast, .no-print { display: none !important; }
  #print-root { display: block; }
  .print-sheet { width: 100%; box-shadow: none; border: none; }
  .print-sheet h1 { font-size: 15pt; margin: 0 0 6pt; border-bottom: 1.2pt solid #333; padding-bottom: 3pt; font-family: var(--serif); }
  .print-sheet h2 { font-size: 11.5pt; margin: 8pt 0 3pt; font-family: var(--serif); }
  .p-meta { display: flex; flex-wrap: wrap; gap: 4pt 14pt; font-size: 9.5pt; margin-bottom: 6pt; }
  .p-block { border: .6pt solid #888; border-radius: 3pt; padding: 5pt 7pt; margin: 4pt 0; break-inside: avoid; page-break-inside: avoid; }
  .p-block .p-label { font-size: 8.5pt; letter-spacing: .15em; color: #444; font-weight: 700; }
  .p-block .p-body { white-space: pre-wrap; }
  .p-memo { min-height: 60pt; }
  .p-foot { font-size: 8pt; color: #666; margin-top: 6pt; }
  .page-break { break-before: page; page-break-before: always; }
  .avoid-break { break-inside: avoid; page-break-inside: avoid; }
}
</style>
</head>

/* ===== ENGINE ===== */

function rngPick(arr, exclude) {
  const pool = exclude ? arr.filter(x => x !== exclude && x.id !== (exclude && exclude.id)) : arr.slice();
  if (!pool.length) return arr[0];
  return pool[Math.floor(Math.random() * pool.length)];
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getMaterial(id) { return MATERIALS.find(m => m.id === id) || null; }
function materialsByGrade(grade) { return MATERIALS.filter(m => m.grade === grade); }

/* 目標タイプの簡易判定 */
function detectObjectiveType(text) {
  if (!text) return null;
  for (const [type, kws] of OBJECTIVE_KEYWORDS) {
    if (kws.some(k => text.includes(k))) return type;
  }
  return null;
}

/* 目標の見取りやすさチェック */
function checkObjectiveWording(text) {
  if (!text) return null;
  const hit = VAGUE_PREDICATES.find(p => text.includes(p));
  const hasObservable = /(できる|挙げられる|説明|比較|要約|書く|選ぶ|整理|まとめられる)/.test(text);
  if (hit && !hasObservable) {
    return "この目標は、達成した姿を見取りにくい表現です。「説明できる」「比較できる」「根拠を挙げられる」などへの修正を検討してください。（強制ではありません）";
  }
  return null;
}

/* 避けたい活動 → 除外条件 */
function violatesAvoided(activity, avoided) {
  if (avoided.includes("グループ活動") && activity.groupType.includes("group") && activity.groupType.length === 1) return true;
  if (avoided.includes("ペア活動") && activity.groupType.includes("pair") && activity.groupType.length === 1) return true;
  if (avoided.includes("端末利用") && activity.requires.includes("生徒用端末")) return true;
  if (avoided.includes("長文記述") && activity.outputType === "long-writing") return true;
  if (avoided.includes("移動を伴う活動") && activity.tags.includes("move")) return true;
  if (avoided.includes("即興発表") && activity.tags.includes("impromptu")) return true;
  if (avoided.includes("競争形式") && activity.tags.includes("competition")) return true;
  if (avoided.includes("多数決") && activity.tags.includes("vote")) return true;
  return false;
}

/* 使える groupType に絞り込む */
function usableGroupTypes(activity, avoided) {
  return activity.groupType.filter(g => {
    if (g === "group" && avoided.includes("グループ活動")) return false;
    if (g === "pair" && avoided.includes("ペア活動")) return false;
    return true;
  });
}

/* 活動フィルタ */
function filterActivities(ctx) {
  const cat = ctx.material ? ctx.material.category : "mixed";
  return ACTIVITIES.filter(a => {
    if (!(a.categories.includes("*") || a.categories.includes(cat))) return false;
    if (ctx.objectiveType && !a.objectiveTypes.includes(ctx.objectiveType)) {
      const ops = OPS_BY_OBJECTIVE[ctx.objectiveType] || [];
      if (!a.ops.some(o => ops.includes(o))) return false;
    }
    if (violatesAvoided(a, ctx.avoidedElements)) return false;
    if (usableGroupTypes(a, ctx.avoidedElements).length === 0) return false;
    for (const req of a.requires) {
      if (!ctx.environment.includes(req)) return false;
    }
    return true;
  });
}

/* 発問の選定 */
function pickQuestionEntry(ctx, excludeId) {
  const cat = ctx.material ? ctx.material.category : "mixed";
  let pool = QUESTIONS.filter(q =>
    (q.categories.includes("*") || q.categories.includes(cat)) &&
    (q.objectiveTypes.includes("*") || q.objectiveTypes.includes(ctx.objectiveType))
  );
  if (excludeId) pool = pool.filter(q => q.id !== excludeId);
  if (!pool.length) pool = QUESTIONS.filter(q => q.categories.includes("*"));
  return rngPick(pool);
}
function questionTarget(ctx) {
  const stage = ctx.lessonStage || "";
  const map = {
    "人物像": "この人物の人柄・考え方", "心情・認識の変化": "人物の変化",
    "人物関係": "人物同士の関係", "表現の効果": "この表現",
    "根拠と主張": "筆者の主張", "要旨": "初めて読む人", "解釈の比較": "この場面",
    "現代との比較": "この人物", "話し合い": "本時のゴール"
  };
  return map[stage] || (ctx.objective ? "本時の目標に関わる内容" : "本時の中心となる内容");
}
function buildQuestion(ctx, excludeId) {
  const entry = pickQuestionEntry(ctx, excludeId);
  const text = entry.template
    .replace("{target}", questionTarget(ctx))
    .replace("{material}", ctx.material ? ctx.material.title : "本教材");
  return { id: entry.id, text, intention: entry.intention, followUps: entry.followUps, supportQuestions: entry.supportQuestions };
}

/* 支援の選定 */
function pickSupports(ctx, mainActivity, count) {
  const scored = SUPPORTS.map(s => {
    let score = 0;
    for (const need of s.targetNeeds) if (ctx.classTendencies.includes(need)) score += 2;
    if (ctx.classTendencies.length === 0) score += Math.random();
    return { s, score: score + Math.random() * 0.5 };
  }).sort((a, b) => b.score - a.score);
  return scored.slice(0, count || 2).map(x => x.s);
}

/* 見取りの選定 */
function pickAssessment(ctx, mainActivity, excludeId) {
  const out = mainActivity ? mainActivity.outputType : "short-writing";
  let pool = ASSESSMENTS.filter(m =>
    (m.objectiveTypes.includes("*") || m.objectiveTypes.includes(ctx.objectiveType)) &&
    (m.outputs.includes("*") || m.outputs.includes(out))
  );
  if (excludeId) pool = pool.filter(m => m.id !== excludeId);
  if (!pool.length) pool = ASSESSMENTS.filter(m => m.objectiveTypes.includes("*"));
  return rngPick(pool);
}

/* ---- 方向性（3案差別化の軸） ---- */
const DIRECTIONS = [
  { id: "write",    label: "個人思考・記述重視", prefer: { group: ["individual"], output: ["short-writing", "long-writing"] } },
  { id: "dialog",   label: "比較・対話重視",     prefer: { group: ["pair", "group", "whole"], ops: ["比較する", "評価する"] } },
  { id: "analysis", label: "本文分析・根拠重視", prefer: { tags: ["text-evidence"], ops: ["根拠づける", "関係づける"] } },
  { id: "short",    label: "時間短縮・焦点化",   prefer: { group: ["individual"], short: true } },
  { id: "support",  label: "支援多め・段階的",   prefer: { group: ["individual", "pair"], supportRich: true } },
  { id: "quiet",    label: "静かな交流・記述接続", prefer: { tags: ["quiet"], group: ["individual", "group"] } }
];

function chooseDirections(ctx, routePrefs) {
  if (routePrefs && routePrefs.length) {
    const routeMap = {
      "交流を減らす案": DIRECTIONS[0], "記述を増やす案": DIRECTIONS[0],
      "比較を中心にする案": DIRECTIONS[1], "根拠を中心にする案": DIRECTIONS[2],
      "時間を短縮する案": DIRECTIONS[3]
    };
    const routeLabels = { "交流を減らす案": "交流を減らす", "記述を増やす案": "記述を増やす", "比較を中心にする案": "比較中心", "根拠を中心にする案": "根拠中心", "時間を短縮する案": "時間短縮" };
    return routePrefs.map(r => Object.assign({}, routeMap[r] || DIRECTIONS[2], { label: routeLabels[r] || r }));
  }
  const noPair = ctx.avoidedElements.includes("ペア活動");
  const noGroup = ctx.avoidedElements.includes("グループ活動");
  const dirs = [DIRECTIONS[0]];
  dirs.push(noPair && noGroup ? DIRECTIONS[5] : DIRECTIONS[1]);
  if (noPair && noGroup) dirs[1] = DIRECTIONS[3];
  dirs.push(DIRECTIONS[2]);
  return dirs;
}

function scoreActivityForDirection(a, dir, ctx) {
  let s = Math.random();
  const p = dir.prefer || {};
  if (p.group && a.groupType.some(g => p.group.includes(g))) s += 2;
  if (p.output && p.output.includes(a.outputType)) s += 2;
  if (p.ops && a.ops.some(o => p.ops.includes(o))) s += 1.5;
  if (p.tags && a.tags.some(t => p.tags.includes(t))) s += 2.5;
  if (p.short && a.duration <= 10) s += 2;
  if (ctx.objectiveType && a.objectiveTypes.includes(ctx.objectiveType)) s += 1.5;
  return s;
}

/* 固定要素 → 必須活動群 */
function fixedActivitySteps(ctx) {
  const pre = [], post = [];
  if (ctx.fixedElements.includes("音読を入れる")) pre.push("音読（観点を一つ添えて）…約5分");
  if (ctx.fixedElements.includes("現在の活動を残す") && ctx.currentActivity) pre.push(`【固定】現在考えている活動：${ctx.currentActivity}`);
  return { pre, post };
}

/* 1案の生成 */
function buildPlan(ctx, dir, locks, prev) {
  locks = locks || {};
  const plan = prev ? JSON.parse(JSON.stringify(prev)) : {};
  plan.direction = dir.label;
  plan.dirId = dir.id;

  const ops = OPS_BY_OBJECTIVE[ctx.objectiveType] || ["根拠づける"];
  const preferOps = (dir.prefer && dir.prefer.ops) ? ops.filter(o => dir.prefer.ops.includes(o)) : [];
  const mainOp = locks.core && prev ? prev.mainOp : (preferOps[0] || rngPick(ops));
  plan.mainOp = mainOp;

  if (!(locks.core && prev)) {
    const coreTemplates = CORES[ctx.objectiveType] || CORES["説明する"];
    plan.core = rngPick(coreTemplates).replace("{stage}", ctx.lessonStage || "本時の内容");
  }

  if (!(locks.question && prev)) {
    if (ctx.fixedElements.includes("現在の中心発問を残す") && ctx.currentQuestion) {
      plan.question = { id: "user", text: ctx.currentQuestion, intention: "（先生が設定した問いです）", followUps: ["その根拠は本文のどこにある？"], supportQuestions: [] };
    } else {
      plan.question = buildQuestion(ctx, prev && prev.question ? prev.question.id : null);
    }
  }

  if (!(locks.activities && prev)) {
    const pool = filterActivities(ctx);
    const budget = Math.max(15, (ctx.duration || 50) - 18); /* 導入・振り返り分を確保 */
    const scored = pool.map(a => ({ a, s: scoreActivityForDirection(a, dir, ctx) })).sort((x, y) => y.s - x.s);
    const picked = [];
    let used = 0;
    const wantPair = ctx.fixedElements.includes("ペア交流を入れる");
    const wantGroup = ctx.fixedElements.includes("グループ交流を入れる");
    const wantWhole = ctx.fixedElements.includes("全体交流を入れる");
    const wantWrite = ctx.fixedElements.includes("書く活動を入れる");
    for (const { a } of scored) {
      if (picked.length >= 3) break;
      if (used + a.duration > budget) continue;
      if (picked.some(p => p.id === a.id)) continue;
      picked.push(a); used += a.duration;
    }
    const ensure = (pred, label) => {
      if (!picked.some(pred)) {
        const cand = pool.filter(pred).sort((x, y) => x.duration - y.duration)[0];
        if (cand && !picked.some(p => p.id === cand.id)) { picked.push(cand); }
      }
    };
    if (wantPair) ensure(a => a.groupType.includes("pair"));
    if (wantGroup) ensure(a => a.groupType.includes("group"));
    if (wantWhole) ensure(a => a.groupType.includes("whole"));
    if (wantWrite) ensure(a => a.outputType === "short-writing" || a.outputType === "long-writing");
    if (ctx.fixedElements.includes("個人で考える時間を入れる")) ensure(a => a.groupType.includes("individual"));
    if (!picked.length && pool.length) picked.push(pool[0]);
    plan.activities = picked.map(a => ({
      id: a.id, title: a.title, duration: a.duration, steps: a.steps,
      groupType: usableGroupTypes(a, ctx.avoidedElements), outputType: a.outputType,
      producesEvidence: a.producesEvidence, caution: a.caution
    }));
  }

  const mainAct = plan.activities && plan.activities.length ?
    plan.activities.reduce((m, a) => (a.producesEvidence && (!m || a.duration > m.duration)) ? a : m, null) || plan.activities[0]
    : null;

  if (!(locks.supports && prev)) {
    const supRich = dir.prefer && dir.prefer.supportRich;
    plan.supports = pickSupports(ctx, mainAct, supRich ? 3 : 2).map(s => ({ id: s.id, group: s.group, title: s.title, text: s.text, caution: s.caution }));
  }

  if (!(locks.assessment && prev)) {
    const m = pickAssessment(ctx, mainAct, prev && prev.assessment ? prev.assessment.id : null);
    plan.assessment = { id: m.id, timing: m.timing, evidence: m.evidence, look: m.look, caution: m.caution };
  }

  if (!(locks.reflection && prev)) {
    plan.reflection = shuffle(REFLECTIONS).slice(0, 2);
  }

  plan.expected = EXPECTED_RESPONSES[ctx.objectiveType] || EXPECTED_RESPONSES["説明する"];
  plan.rationale = buildRationale(ctx, plan, mainAct);
  plan.shortcut = buildShortcut(plan);
  plan.altIfFlat = "候補（選択肢）を二つ示して、選ぶところから再開します。選んだ理由を問えば、思考は同じ地点に戻れます。";
  plan.fixedNotes = fixedActivitySteps(ctx);
  plan.warnings = checkPlan(ctx, plan, mainAct);
  return plan;
}

/* --- 「この案のよさ」テンプレート（目標タイプ別・2文） --- */
const RATIONALE_TEMPLATES = {
  "内容を捉える": ["本文の大事な部分を整理し、内容を自分の言葉で捉える案です。", "何となく読んで終わらず、どの言葉を手がかりにしたかを残せます。"],
  "根拠を挙げる": ["本文から根拠を選び、そこから何が言えるかまで説明する案です。", "叙述を抜き出すだけでなく、自分の考えとのつながりを確かめられます。"],
  "比較する": ["二つ以上の場面・表現・考えを比べ、違いや共通点から考えをまとめる案です。", "比べる観点をはっきりさせることで、感想だけで終わりにくくなります。"],
  "関係づける": ["複数の叙述や段落をつなげて、互いの関係を捉える案です。", "一部分だけで判断せず、文章全体を見て考えられます。"],
  "説明する": ["自分の考えを、本文の言葉や具体例と結び付けて説明する案です。", "「そう思った」で終わらず、理由まで相手に伝えられます。"],
  "解釈する": ["一つの読みで決めつけず、叙述を基に自分なりの読みをつくる案です。", "別の読み方とも比べながら、より本文に合う説明を探せます。"],
  "評価する": ["筆者の主張や表現が本当に妥当か、根拠を確かめながら考える案です。", "賛成・反対だけでなく、そう判断した理由を言葉にできます。"],
  "要約する": ["何を残し、何を削るかを考えながら、文章の中心を短くまとめる案です。", "字数を減らすだけでなく、大事な内容を選ぶ判断が残ります。"],
  "表現する": ["伝えたい内容と、相手・目的に合う表現を選ぶ案です。", "書くこと自体ではなく、なぜその表現にしたのかも考えられます。"],
  "推敲する": ["観点を一つに絞り、直す前と後を比べながら文章を整える案です。", "何となく書き直すのではなく、直した理由を確かめられます。"],
  "話し合う": ["意見を出し合うだけでなく、違いを比べたり、自分の考えを直したりするところまで行う案です。", "話した後に何が変わったかを、記述として残せます。"]
};

function buildRationale(ctx, plan, mainAct) {
  const type = ctx.objectiveType || "説明する";
  const tpl = RATIONALE_TEMPLATES[type] || RATIONALE_TEMPLATES["説明する"];
  let s1 = tpl[0], s2 = tpl[1];
  /* 主活動に応じた軽い差し替え（不自然にならない範囲） */
  if (mainAct) {
    if (/順位|選ぶ|一つに|比べて選/.test(mainAct.title)) {
      s2 = "候補を比べて選ぶ形なので、感想で終わらず、選んだ理由が言葉として残ります。";
    } else if (mainAct.outputType === "marking") {
      s2 = "本文に線を引く工程が入るので、どの叙述を手がかりにしたかが後から見えます。";
    } else if (mainAct.outputType === "chart") {
      s2 = "表や図に整理する形なので、考えの途中経過が残り、見取りにも使えます。";
    } else if (mainAct.groupType && !mainAct.groupType.includes("individual")) {
      s2 = s2 + "交流の前後で考えがどう変わったかも見取れます。";
    }
  }
  return {
    fit: s1 + s2,
    look: plan.assessment ? assessmentNatural(plan.assessment)[0] : "",
    stumble: (plan.expected || []).slice(0, 2).join("／"),
    note: mainAct ? mainAct.caution : ""
  };
}

/* 見取りの自然文フォーマッタ（内部構造は維持し、表示時に整形） */
function assessmentNatural(a) {
  if (!a) return ["", ""];
  const line1 = `${a.timing}に、${a.evidence.replace(/か。$/, "かを見ます。").replace(/。$/, "を見ます。")}`;
  const line2 = (a.look + " " + a.caution).replace(/見る。/g, "見ます。").trim();
  return [line1, line2];
}

function buildShortcut(plan) {
  if (!plan.activities || plan.activities.length <= 1) {
    return "振り返りを「根拠にした叙述を一つ書く」の一文に絞ります。";
  }
  const drop = plan.activities[plan.activities.length - 1];
  return `「${drop.title}」を割愛し、主活動の記述時間を確保します。振り返りは一文（根拠にした叙述）に絞ります。`;
}

/* 整合性チェック（警告。出力は止めない） */
function checkPlan(ctx, plan, mainAct) {
  const warns = [];
  const totalTime = (plan.activities || []).reduce((s, a) => s + a.duration, 0) + 15;
  if (totalTime > (ctx.duration || 50) + 5) {
    warns.push(`活動が少し多めです。${ctx.duration || 50}分なら、中心になる活動を一つ減らした方が収まりそうです。`);
  }
  const hasExchange = (plan.activities || []).some(a => a.groupType.some(g => g !== "individual"));
  const hasWriteAfter = (plan.activities || []).some(a => a.outputType === "short-writing" || a.outputType === "long-writing" || a.outputType === "chart" || a.outputType === "marking");
  if (hasExchange && !hasWriteAfter) {
    warns.push("話し合いは入っていますが、話した後に何を変えるのかがまだ曖昧です。比べる・選び直す・書き直すなど、交流後の動きを一つ決めておくと授業が締まります。");
  }
  if (!(plan.activities || []).some(a => a.producesEvidence)) {
    warns.push("このままだと、生徒が何を考えたかが残りにくそうです。最後に一文だけでも書く時間を取ると、見取りやすくなります。");
  }
  if (ctx.objectiveType === "根拠を挙げる" && !(plan.activities || []).some(a => ["marking", "short-writing", "long-writing"].includes(a.outputType))) {
    warns.push("本文に戻る場面がまだ弱いかもしれません。線を引く・書き抜くなど、叙述に触れる工程を一つ入れると目標に近づきます。");
  }
  if (ctx.classTendencies.length > 5) {
    warns.push("選んだ傾向が多く、案がやや複雑になっています。特に気になる項目に絞ると、焦点がはっきりします。");
  }
  return warns;
}

/* 3案生成（差の確保つき） */
function generatePlans(ctx, routePrefs, prevPlans, locksList) {
  const dirs = chooseDirections(ctx, routePrefs);
  const plans = [];
  for (let i = 0; i < dirs.length; i++) {
    const prev = prevPlans ? prevPlans[i] : null;
    const locks = locksList ? locksList[i] : null;
    let p = buildPlan(ctx, dirs[i], locks, prev);
    /* 差の確保：主活動が既出と同一なら1回だけ引き直す */
    for (let retry = 0; retry < 3; retry++) {
      const mainIds = plans.map(x => x.activities && x.activities[0] ? x.activities[0].id : "");
      const myMain = p.activities && p.activities[0] ? p.activities[0].id : "x";
      const sameOpAndAct = plans.some(x => x.mainOp === p.mainOp) && mainIds.includes(myMain);
      if (!sameOpAndAct || (locks && (locks.activities || locks.core))) break;
      p = buildPlan(ctx, dirs[i], locks, prev);
    }
    plans.push(p);
  }
  return plans;
}

/* モードB：部分ガチャ */
function generatePartial(ctx, fields) {
  const dir = DIRECTIONS[2];
  const full = buildPlan(ctx, dir, {}, null);
  const out = {};
  fields.forEach(f => { out[f] = full[f === "intro" ? "core" : f]; });
  if (fields.includes("intro")) {
    out.intro = rngPick([
      "結末・結論を先に示し、「なぜそうなるのか」と遡らせる導入。",
      "本文の一語・一文だけを提示し、気づきと疑問を出させる導入。",
      "前時の振り返りの記述を一つ紹介し、疑問を重ねて本時の課題へつなぐ導入。",
      "対立する二つの読み方を先に提示し、どちらが本文に合うかを予想させる導入。"
    ]);
  }
  return { fields, data: out, plan: full };
}

/* モードD：困りごと解決 */
function concernSolutions(concern) {
  return CONCERN_SOLUTIONS[concern] || [];
}

/* 出力テキスト生成 */
function planToText(ctx, plan) {
  const L = [];
  const add = (label, body) => { if (body) L.push(`【${label}】\n${body}`); };
  add("学年", ctx.grade ? `中学${ctx.grade}年` : "");
  add("教材", ctx.material ? `${ctx.material.title}（${CATEGORIES[ctx.material.category].label}）` : ctx.customMaterialTitle || "");
  add("本時の段階", ctx.lessonStage);
  add("授業時間", (ctx.duration || 50) + "分");
  add("本時の目標", ctx.objective);
  add("方向性", plan.direction);
  add("授業の中心", plan.core);
  if (plan.question) add("中心発問", plan.question.text + (plan.question.intention ? `\n（この問いで考えさせたいこと）${plan.question.intention}` : ""));
  if (plan.activities) {
    const acts = plan.activities.map((a, i) => `${i + 1}．${a.title}（約${a.duration}分）\n　${a.steps.join(" → ")}`).join("\n");
    add("学習活動", (plan.fixedNotes && plan.fixedNotes.pre.length ? plan.fixedNotes.pre.join("\n") + "\n" : "") + acts);
  }
  if (plan.supports) add("支援", plan.supports.map(s => `・${s.title}：${s.text}`).join("\n"));
  if (plan.assessment) add("見取り", assessmentNatural(plan.assessment).join("\n"));
  if (plan.reflection) add("振り返り", plan.reflection.map(r => "・" + r).join("\n"));
  if (plan.question && plan.question.followUps) add("問い返し・補助発問", plan.question.followUps.concat(plan.question.supportQuestions || []).map(f => "・" + f).join("\n"));
  if (plan.expected) add("想定される反応", plan.expected.map(e => "・" + e).join("\n"));
  add("時間不足時・代替案", "（時間が足りないとき）" + plan.shortcut + "\n（反応が出ないとき）" + plan.altIfFlat);
  add("留意点", plan.rationale ? plan.rationale.note : "");
  L.push("―――\n※このメモは授業づくりの叩き台です。教材・目標・学級の状況に合わせて修正して使用してください。");
  return L.join("\n\n");
}

      await navigator.clipboard.writeText(text);

      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove();
    }

function partialLabel(id) {

function partialIdFromLabel(label) {
  const map = { "導入": "intro", "授業の核": "core", "中心発問": "question", "学習活動": "activities", "支援": "supports", "見取り": "assessment", "振り返り": "reflection" };
  return map[label] || label;
}

function secHtml(i, key, name, bodyHtml, copyText_) {
  const locked = !!state.locks[i][key];
  return `<div class="plan-sec">

      </span>
    </div>
    <div class="sec-body">${bodyHtml}</div>
  </div>`;
}

  const q = plan.question || {};

  return `<div class="card plan-card ${i === 1 ? "alt" : ""}">
    <span class="tanzaku">${esc(plan.direction)}</span>
    <div class="plan-title">案${["一","二","三"][i] || i + 1}</div>
    ${secHtml(i, "core", RESULT_LABELS.core, esc(plan.core) + (opTag ? `<div class="small">${esc(opTag)}授業です。</div>` : ""))}
    ${secHtml(i, "question", RESULT_LABELS.question, `<b>${esc(q.text)}</b><div class="small">この問いで考えさせたいこと：${esc(q.intention)}</div>`)}
    ${secHtml(i, "activities", RESULT_LABELS.activities, (plan.fixedNotes && plan.fixedNotes.pre.length ? `<div class="small">${plan.fixedNotes.pre.map(esc).join("<br>")}</div>` : "") + `<ol>${(plan.activities || []).map(a => `<li><b>${esc(a.title)}</b>（約${a.duration}分）<div class="small">${a.steps.map(esc).join(" → ")}</div></li>`).join("")}</ol>`)}
    ${secHtml(i, "supports", RESULT_LABELS.supports, `<ul>${(plan.supports || []).map(s => `<li><b>${esc(s.title)}</b>：${esc(s.text)}</li>`).join("")}</ul>`)}
    ${secHtml(i, "assessment", RESULT_LABELS.assessment, plan.assessment ? `${esc(assess[0])}<div class="small">${esc(assess[1])}</div>` : "")}
    ${secHtml(i, "reflection", RESULT_LABELS.reflection, `<ul>${(plan.reflection || []).map(r => `<li>${esc(r)}</li>`).join("")}</ul>`)}
    <div class="reason"><b>この案のよさ</b><p style="margin:6px 0 0">${esc(plan.rationale.fit)}</p></div>
    ${plan.warnings && plan.warnings.length ? `<div class="warn-list">${plan.warnings.map(w => `<div class="warn-item">${esc(w)}</div>`).join("")}</div>` : ""}
    <details class="more"><summary>困ったときの手立てを見る</summary>
      <div class="sec-body">
        <b>こんな反応が出そう</b><ul>${(plan.expected || []).map(e => `<li>${esc(e)}</li>`).join("")}</ul>
        <b>もう一歩考えさせる問い</b><ul>${(q.followUps || []).map(f => `<li>${esc(f)}</li>`).join("")}</ul>
        <b>止まったときのひと押し</b><ul>${(q.supportQuestions || []).map(f => `<li>${esc(f)}</li>`).join("")}</ul>
        <b>時間が足りないとき</b><p>${esc(plan.shortcut)}</p>
        <b>反応が出ないとき</b><p>${esc(plan.altIfFlat)}</p>
        ${plan.rationale.note ? `<b>気をつけたいこと</b><p>${esc(plan.rationale.note)}</p>` : ""}
      </div>
    </details>
    <div class="btn-row">
      <button class="btn primary" data-adopt="${i}">この案を採用して編集へ</button>
      <button class="btn" data-redraw-card="${i}">この案を引き直す</button>
      <button class="btn" data-copy-card="${i}">全文コピー</button>
    </div>
  </div>`;
}

  ${fld("reflection", "最後に考えさせたいこと", e.reflection)}
  ${fld("shortcut", "時間が足りないとき・反応が出ないとき", e.shortcut)}
  ${fld("note", "気をつけたいこと", e.note)}
  ${fld("memo", "教員メモ（任意）", e.memo)}`;
  document.querySelectorAll("[data-edit]").forEach(ta => {
    ta.addEventListener("input", () => { state.edited[ta.dataset.edit] = ta.value; });
  });
};

function makeEditable(plan, ctx) {
  const q = plan.question || {};
  return {
    core: plan.core,
    question: q.text || "",
    activities: (plan.fixedNotes && plan.fixedNotes.pre.length ? plan.fixedNotes.pre.join("\n") + "\n" : "") +
      (plan.activities || []).map((a, i) => `${i + 1}．${a.title}（約${a.duration}分）\n　${a.steps.join(" → ")}`).join("\n"),
    followUps: (q.followUps || []).concat(q.supportQuestions || []).map(f => "・" + f).join("\n"),
    expected: (plan.expected || []).map(x => "・" + x).join("\n"),
    supports: (plan.supports || []).map(s => `・${s.title}：${s.text}`).join("\n"),
    assessment: plan.assessment ? assessmentNatural(plan.assessment).join("\n") : "",
    reflection: (plan.reflection || []).map(r => "・" + r).join("\n"),
    shortcut: plan.shortcut + "\n" + plan.altIfFlat,
    note: (plan.rationale ? plan.rationale.note : ""),
    fit: plan.rationale ? plan.rationale.fit : "",
    direction: plan.direction,
    memo: ""
  };
}

/* 出力画面 */
SCREENS.output = () => {
  bottomBar(`<button class="btn" data-nav="edit">編集に戻る</button>`);
  $app.innerHTML = `
  <h2>出力</h2>
  <div class="card">
    <h3 style="margin-top:0">A4印刷・PDF保存</h3>
    <p class="small">印刷画面から、紙への印刷またはPDF保存を選べます。</p>
    <div class="btn-row">
      <button class="btn primary" data-print="1">A4・1枚版（授業準備用）</button>
      <button class="btn primary" data-print="2">A4・2枚版（授業研究用）</button>
    </div>
    <h3>コピー</h3>
    <div class="btn-row">
      <button class="btn" id="btn-copy-all">全文コピー</button>
    </div>
    <div class="btn-row">
      ${["question:中心発問", "activities:学習活動", "supports:支援", "assessment:見取り", "reflection:振り返り", "core:授業の中心"].map(x => { const [k, l] = x.split(":"); return `<button class="btn small" data-copy-item="${k}">${esc(l)}だけ</button>`; }).join("")}
    </div>
  </div>
  <p class="small">出力前チェック：目標とのつながり／教材との整合／時間内に収まるか／見取り場面／個人情報が含まれていないか。</p>`;
};

function editedToText() {
  const ctx = ctxFromState(); const e = state.edited;
  const L = [];
  const add = (label, body) => { if (body && String(body).trim()) L.push(`【${label}】\n${body}`); };
  add("学年", ctx.grade ? `中学${ctx.grade}年` : "");
  add("教材", ctx.material ? ctx.material.title : "");
  add("本時の段階", ctx.lessonStage);
  add("授業時間", (ctx.duration || 50) + "分");
  add("本時の目標", ctx.objective);
  add("方向性", e.direction);
  add("授業の中心", e.core);
  add("中心発問", e.question);
  add("学習活動", e.activities);
  add("支援", e.supports);
  add("見取り", e.assessment);
  add("振り返り", e.reflection);
  add("問い返し・補助発問", e.followUps);
  add("想定される反応", e.expected);
  add("時間不足時・代替案", e.shortcut);
  add("留意点", e.note);
  add("教員メモ", e.memo);
  L.push("―――\n※このメモは授業づくりの叩き台です。教材・目標・学級の状況に合わせて修正して使用してください。");
  return L.join("\n\n");
}

/* 印刷 */
function buildPrintSheet(pages) {
  const ctx = ctxFromState(); const e = state.edited;
  const b = (label, body, cls) => body && String(body).trim() ? `<div class="p-block ${cls || ""}"><div class="p-label">${esc(label)}</div><div class="p-body">${esc(body)}</div></div>` : "";
  let html = `<div class="print-sheet">
    <h1>授業設計メモ${pages === 2 ? "（詳細版）" : ""}</h1>
    <div class="p-meta">
      <span>学年：中学${esc(ctx.grade)}年</span>
      <span>教材：${esc(ctx.material ? ctx.material.title : "")}</span>
      <span>段階：${esc(ctx.lessonStage)}</span>
      <span>時間：${esc(ctx.duration)}分</span>
      <span>方向性:${esc(e.direction)}</span>
    </div>
    ${b("本時の目標", ctx.objective)}
    ${b("授業の中心", e.core)}
    ${b("中心発問", e.question)}
    ${b("学習活動", e.activities)}
    ${b("支援", e.supports)}
    ${b("見取り", e.assessment)}
    ${b("振り返り", e.reflection)}
    <div class="p-block p-memo"><div class="p-label">教員メモ</div><div class="p-body">${esc(e.memo)}</div></div>`;
  if (pages === 2) {
    html += `<div class="page-break"></div>
    <h1>検討用資料（2枚目）</h1>
    ${b("この案のよさ", e.fit)}
    ${b("想定される反応", e.expected)}
    ${b("問い返し・補助発問", e.followUps)}
    ${b("時間不足時の対応", e.shortcut)}
    ${b("留意点", e.note)}`;
  }
  html += `<div class="p-foot">授業設計ガチャ（授業づくりの叩き台）／そのまま使用せず、教材・目標・学級の状況に合わせて修正して使用してください。</div></div>`;
  return html;
}

function openPrint(pages) {
  showChecklist(() => {
    document.getElementById("print-root").innerHTML = buildPrintSheet(pages);
    setTimeout(() => {
      try { window.print(); }
      catch (e) { toast("印刷画面を開けませんでした。ブラウザの共有・印刷機能から出力してください"); }
    }, 60);
  });
}

/* 出力前チェックリスト */
function showChecklist(onOk) {
  const items = ["本時の目標につながっている", "教材の内容と矛盾していない", "学級全体の傾向に合っている", "時間内に実施できる", "見取る場面が明確である", "個人情報を入力していない"];
  $modal.innerHTML = `<div class="modal-back" id="mback"><div class="modal" role="dialog" aria-label="出力前の確認">
    <h2>出力前の確認</h2>
    ${items.map(x => `<label class="check-line"><input type="checkbox" class="check-item">${esc(x)}</label>`).join("")}
    <div class="btn-row"><button class="btn" id="mcancel">戻る</button><button class="btn primary" id="mok" disabled>確認して出力</button></div>
    <p class="small">すべての項目を確認すると、出力できるようになります。</p>
  </div></div>`;
  const boxes = [...document.querySelectorAll(".check-item")];
  const okBtn = document.getElementById("mok");
  boxes.forEach(b => b.addEventListener("change", () => { okBtn.disabled = !boxes.every(x => x.checked); }));
  document.getElementById("mcancel").onclick = () => $modal.innerHTML = "";
  document.getElementById("mback").addEventListener("click", ev => { if (ev.target.id === "mback") $modal.innerHTML = ""; });
  document.getElementById("mok").onclick = () => { $modal.innerHTML = ""; onOk(); };
}

/* 下書き保存 */
function saveDraft() {
  $modal.innerHTML = `<div class="modal-back" id="mback"><div class="modal" role="dialog" aria-label="下書きの保存">
    <h2>この端末に下書きを保存</h2>
    <p class="small">入力内容は、この端末のブラウザ内にのみ保存されます。外部には送信されません。共有端末では保存しないでください。</p>
    <div class="btn-row"><button class="btn" id="mcancel">やめる</button><button class="btn primary" id="mok">保存する</button></div>
  </div></div>`;
  document.getElementById("mcancel").onclick = () => $modal.innerHTML = "";
  document.getElementById("mback").addEventListener("click", ev => { if (ev.target.id === "mback") $modal.innerHTML = ""; });
  document.getElementById("mok").onclick = () => {
    try {
      const dump = JSON.parse(JSON.stringify(state));
      dump._savedAt = new Date().toISOString(); dump._version = APP_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dump));
      toast("この端末に下書きを保存しました");
    } catch (e) { toast("このブラウザでは保存できませんでした。全文コピーまたはPDF保存をご利用ください"); }
    $modal.innerHTML = "";
  };
}
function loadDraft() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { toast("保存された下書きはありません"); return; }
    const d = JSON.parse(raw);
    Object.keys(state).forEach(k => { if (k in d) state[k] = d[k]; });
    toast("下書きを読み込みました（" + (d._savedAt || "").slice(0, 10) + "保存）");
    render(state.plans && state.plans.length ? "result" : "step1");
  } catch (e) { toast("下書きを読み込めませんでした"); }
}
function clearStorage() {
  $modal.innerHTML = `<div class="modal-back" id="mback"><div class="modal" role="dialog">
    <h2>保存データの全削除</h2><p class="small">この端末に保存された下書きを削除します。元に戻せません。</p>
    <div class="btn-row"><button class="btn" id="mcancel">やめる</button><button class="btn danger" id="mok">削除する</button></div></div></div>`;
  document.getElementById("mcancel").onclick = () => $modal.innerHTML = "";
  document.getElementById("mok").onclick = () => { try { localStorage.removeItem(STORAGE_KEY); toast("保存データを削除しました"); } catch (e) {} $modal.innerHTML = ""; };
}

function confirmResetAll() {
  $modal.innerHTML = `<div class="modal-back" id="mback"><div class="modal" role="dialog" aria-label="最初からやり直す">
    <h2>最初からやり直す</h2>
    <p class="small">入力した条件とガチャ結果をすべて消して、最初からやり直しますか？<br>この端末に保存済みの下書きは削除されません。</p>
    <div class="btn-row"><button class="btn" id="mcancel">やめる</button><button class="btn danger" id="mok">最初からやり直す</button></div>
  </div></div>`;
  document.getElementById("mcancel").onclick = () => $modal.innerHTML = "";
  document.getElementById("mback").addEventListener("click", ev => { if (ev.target.id === "mback") $modal.innerHTML = ""; });
  document.getElementById("mok").onclick = () => { $modal.innerHTML = ""; resetAllState(); render("step1"); toast("最初の状態に戻しました"); };
}

/* ============ ルーティング・イベント ============ */
function render(screen) {
  if (screen) state.screen = screen;
  (SCREENS[state.screen] || SCREENS.top)();
  window.scrollTo(0, 0);
}

function validateStep(from) {
  if (from === "step1") {
    if (!state.grade) { toast("学年を選んでください"); return false; }
    if (!state.materialId) { toast("教材を選んでください"); return false; }
  }
  if (from === "step2") {
    if (!state.lessonStage) { toast("本時の段階を選んでください"); return false; }
  }
  return true;
}

function rollGacha() {
  const ctx = ctxFromState();
  if (state.mode === "concern") {
    if (!state.concerns.length) { toast("STEP4で困りごとを選んでください"); return; }
    render("resultConcern"); return;
  }
  if (state.mode === "partial") {
    const fields = state.partialFields.length ? state.partialFields : ["question", "activities"];
    state.partialResult = generatePartial(ctx, fields);
    render("resultPartial"); return;
  }
  const routePrefs = state.mode === "route" ? (state.routePrefs.length ? state.routePrefs.slice(0, 3) : ["比較を中心にする案", "根拠を中心にする案", "時間を短縮する案"]) : null;
  state.locks = [{}, {}, {}];
  try {
    state.plans = generatePlans(ctx, routePrefs);
    if (!state.plans.length || !state.plans[0].activities || !state.plans[0].activities.length) {
      toast("選択された条件では候補が見つかりませんでした。固定条件または避けたい活動を一部見直してください"); return;
    }
    render("result");
  } catch (e) {
    console.error(e);
    toast("生成でエラーが発生しました。条件を見直してください");
  }
}

function redrawField(i, key) {
  if (state.locks[i][key]) { toast("この項目はキープ中です。キープを外すと引き直せます"); return; }
  const ctx = ctxFromState();
  const dirId = state.plans[i].dirId;
  const dir = DIRECTIONS.find(d => d.id === dirId) || DIRECTIONS[0];
  const locks = {};
  ["core", "question", "activities", "supports", "assessment", "reflection"].forEach(k => { if (k !== key) locks[k] = true; });
  const np = buildPlan(ctx, dir, locks, state.plans[i]);
  np.direction = state.plans[i].direction;
  state.plans[i] = np;
  render("result");
}

function sectionCopyText(i, key) {
  const p = state.plans[i]; const ctx = ctxFromState();
  const full = planToText(ctx, p);
  const map = COPY_LABELS;
  const label = map[key];
  const m = full.split("\n\n").find(x => x.startsWith("【" + label + "】"));
  return m || "";
}

document.addEventListener("click", ev => {
  const t = ev.target.closest("button, [role=button]");
  if (!t) return;
  if (t.dataset.nav) {
    const from = state.screen;
    if ((t.dataset.nav === "step2" && from === "step1" && !validateStep("step1")) ||
        (t.dataset.nav === "step3" && from === "step2" && !validateStep("step2"))) return;
    render(t.dataset.nav); return;
  }
  if (t.id === "brand-home") { render("top"); return; }
  if (t.id === "btn-save-draft") { saveDraft(); return; }
  if (t.id === "btn-reset-all") { confirmResetAll(); return; }
  if (t.dataset.stepReset) {
    const fn = STEP_RESETS[t.dataset.stepReset];
    if (fn) { fn(); render(t.dataset.stepReset); toast("この画面の選択をリセットしました"); }
    return;
  }
  if (t.dataset.clearMulti) {
    const key = t.dataset.clearMulti;
    state[key] = [];
    if (key === "classTendencies") state._noTendency = false;
    render(state.screen); return;
  }
  if (t.id === "btn-load-draft") { loadDraft(); return; }
  if (t.id === "btn-clear-storage") { clearStorage(); return; }
  if (t.id === "btn-roll") { rollGacha(); return; }
  if (t.id === "btn-reroll-all") {
    const ctx = ctxFromState();
    const routePrefs = state.mode === "route" ? (state.routePrefs.length ? state.routePrefs.slice(0, 3) : null) : null;
    state.plans = generatePlans(ctx, routePrefs, state.plans, state.locks);
    render("result"); return;
  }
  if (t.id === "btn-repartial") {
    state.partialResult = generatePartial(ctxFromState(), state.partialResult.fields);
    render("resultPartial"); return;
  }
  if (t.id === "btn-to-output") { render("output"); return; }
  if (t.id === "btn-reset-edit") {
    state.edited = makeEditable(state.plans[state.selectedIndex], ctxFromState());
    render("edit"); toast("ガチャ結果に戻しました"); return;
  }
  if (t.id === "btn-copy-all") { showChecklist(() => copyText(editedToText(), "全文")); return; }
  if (t.dataset.copyItem) {
    const key = t.dataset.copyItem;
    const label = { question: "中心発問", activities: "学習活動", supports: "支援", assessment: "見取り", reflection: "振り返り", core: "授業の中心" }[key];
    copyText(`【${label}】\n` + (state.edited[key] || ""), label); return;
  }
  if (t.dataset.print) { openPrint(Number(t.dataset.print)); return; }
  if (t.dataset.adopt != null) {
    state.selectedIndex = Number(t.dataset.adopt);
    state.edited = makeEditable(state.plans[state.selectedIndex], ctxFromState());
    render("edit"); return;
  }
  if (t.dataset.redrawCard != null) {
    const i = Number(t.dataset.redrawCard);
    const ctx = ctxFromState();
    const dir = DIRECTIONS.find(d => d.id === state.plans[i].dirId) || DIRECTIONS[0];
    state.plans[i] = buildPlan(ctx, dir, state.locks[i], state.plans[i]);
    render("result"); return;
  }
  if (t.dataset.copyCard != null) {
    copyText(planToText(ctxFromState(), state.plans[Number(t.dataset.copyCard)]), "この案の全文"); return;
  }
  if (t.dataset.lock) {
    const [i, key] = t.dataset.lock.split(":");
    state.locks[i][key] = !state.locks[i][key];
    render("result"); return;
  }
  if (t.dataset.redraw) {
    const [i, key] = t.dataset.redraw.split(":");
    redrawField(Number(i), key); return;
  }
  if (t.dataset.copysec) {
    const [i, key] = t.dataset.copysec.split(":");
    copyText(sectionCopyText(Number(i), key), "この項目"); return;
  }
  if (t.dataset.partialRedraw) {
    const f = t.dataset.partialRedraw;
    const nr = generatePartial(ctxFromState(), [f]);
    state.partialResult.data[f] = nr.data[f];
    render("resultPartial"); return;
  }
  if (t.dataset.partialCopy) {
    const f = t.dataset.partialCopy; const d = state.partialResult.data[f];
    let text = "";
    if (typeof d === "string") text = d;
    else if (f === "question") text = d.text + "\n（この問いで考えさせたいこと）" + d.intention + "\n（問い返し）" + d.followUps.join("／");
    else if (f === "activities") text = d.map((a, i2) => `${i2 + 1}．${a.title}（約${a.duration}分）\n　${a.steps.join(" → ")}`).join("\n");
    else if (f === "supports") text = d.map(s => `・${s.title}：${s.text}`).join("\n");
    else if (f === "assessment") text = assessmentNatural(d).join("\n");
    else if (f === "reflection") text = d.map(x => "・" + x).join("\n");
    copyText(`【${partialLabel(f)}】\n` + text, partialLabel(f)); return;
  }
  if (t.dataset.mat) {
    state.materialId = t.dataset.mat;
    render("step1"); return;
  }
  if (t.dataset.objCand != null) {
    state.objective = t.dataset.objCand;
    state.objectiveType = detectObjectiveType(state.objective) || state.objectiveType;
    render("step2"); return;
  }
  if (t.dataset.chip != null) {
    const key = t.dataset.key, val = t.dataset.chip, multi = t.dataset.multi === "1";
    if (key === "grade") { state.grade = Number(val.replace(/[^0-9]/g, "")); state.materialId = null; state.lessonStage = null; render("step1"); return; }
    if (key === "duration") { state.duration = val === "45分" ? 45 : val === "50分" ? 50 : 50; render("step1"); return; }
    if (key === "noTendency") { state.classTendencies = []; state._noTendency = true; render("step3"); return; }
    if (key === "mode") { state.mode = val; render("step5"); return; }
    if (key === "partialFieldsLabel") {
      const id = partialIdFromLabel(val);
      const idx = state.partialFields.indexOf(id);
      if (idx >= 0) state.partialFields.splice(idx, 1); else state.partialFields.push(id);
      render("step5"); return;
    }
    if (key === "lessonStage") { state.lessonStage = val; render("step2"); return; }
    if (key === "objectiveType") { state.objectiveType = val; render("step2"); return; }
    if (key === "concerns") {
      const NONE = "特に困りごとはない";
      if (val === NONE) {
        state.concerns = state.concerns.includes(NONE) ? [] : [NONE];
      } else {
        const idx = state.concerns.indexOf(val);
        if (idx >= 0) state.concerns.splice(idx, 1);
        else { state.concerns = state.concerns.filter(c => c !== NONE); state.concerns.push(val); }
      }
      render(state.screen); return;
    }
    if (multi) {
      const arr = state[key];
      const idx = arr.indexOf(val);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
      if (key === "classTendencies") state._noTendency = false;
      render(state.screen); return;
    }
    state[key] = val; render(state.screen);
  }
});
document.getElementById("brand-home").addEventListener("keydown", ev => { if (ev.key === "Enter" || ev.key === " ") render("top"); });

window.APP_STATE = state;
render("top");
</script>
